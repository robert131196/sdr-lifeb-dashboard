<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SDR Life B</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }
        .kpi-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .kpi-value {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
        }
        .status-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard SDR Life B</h1>
        
        <div class="kpis">
            <div class="kpi-card">
                <div class="kpi-label">Leads na Base</div>
                <div class="kpi-value" id="leads">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Leads Trabalhados</div>
                <div class="kpi-value" id="trabalhados">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Contato Efetivo %</div>
                <div class="kpi-value" id="efetivo">0%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Agendados</div>
                <div class="kpi-value" id="agendados">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Taxa Agendamento %</div>
                <div class="kpi-value" id="taxa">0%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Tempo Médio (min)</div>
                <div class="kpi-value" id="tempo">0</div>
            </div>
        </div>

        <div class="status-info">
            <p>✅ Dashboard pronto! Aguardando primeira atualização de dados...</p>
        </div>
    </div>

    <script>
        function updateDashboard(data) {
            document.getElementById('leads').textContent = data.leads || 0;
            document.getElementById('trabalhados').textContent = data.trabalhados || 0;
            document.getElementById('efetivo').textContent = (data.efetivo || 0).toFixed(1) + '%';
            document.getElementById('agendados').textContent = data.agendados || 0;
            document.getElementById('taxa').textContent = (data.taxa || 0).toFixed(1) + '%';
            document.getElementById('tempo').textContent = (data.tempo || 0).toFixed(1);
        }
    </script>
</body>
</html>
